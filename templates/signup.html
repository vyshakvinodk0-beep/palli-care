{% extends "base.html" %}
{% block content %}

<div class="form-box">
    <h2 class="form-title">Join PalliCare</h2>

    <!-- ✅ FLASH MESSAGE -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert {% if category == 'success' %}alert-success{% else %}alert-danger{% endif %} text-center">
              {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3 position-relative">
            <i class="fas fa-user position-absolute top-50 translate-middle-y ms-3 opacity-50"></i>
            <input class="ps-5" name="username" placeholder="Username" required autofocus>
        </div>
        <div class="mb-3 position-relative">
            <i class="fas fa-lock position-absolute top-50 translate-middle-y ms-3 opacity-50"></i>
            <input class="ps-5" type="password" name="password" placeholder="Password" required>
        </div>

        <div class="mb-4 position-relative">
            <i class="fas fa-user-tag position-absolute top-50 translate-middle-y ms-3 opacity-50"></i>
            <select class="ps-5" name="role" required>
                <option value="">Select Role</option>
                <option value="caregiver">Caregiver</option>
                <option value="nurse">Nurse</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button class="btn btn-glow w-100 mb-4">CREATE ACCOUNT <i class="fas fa-user-plus ms-2"></i></button>
    </form>

    <div class="text-center mb-4">
        <span class="opacity-75">Already have an account?</span>
        <a href="/login" class="link fw-bold ms-1">Login</a>
    </div>

    <div class="pt-3 border-top border-secondary border-opacity-10 text-center">
        <a href="/" class="btn btn-outline w-100">
            <i class="fas fa-home me-2"></i> Back to Home
        </a>
    </div>

</div>

{% endblock %}
