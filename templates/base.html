<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Palliative Care</title>

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- ✅ PREMIUM NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">💙 AI Palliative Care</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navMenu">

            {% if session.get("user") %}

                <span class="text-white me-3">👤 {{ session["user"] }}</span>
                <a href="/logout" class="btn btn-danger btn-sm">Logout</a>

            {% else %}

                <a href="/login" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="/signup" class="btn btn-info btn-sm">Signup</a>

            {% endif %}

        </div>
    </div>
</nav>


<!-- ✅ PAGE CONTENT -->
<div class="container py-5">
    {% block content %}{% endblock %}
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
