{% extends "base.html" %}
{% block content %}

<div class="container py-5">

    <h3 class="text-center text-white mb-4">Assigned Patient Visits</h3>

    <table class="table table-dark table-hover text-center">

        <tr>
            <th>Patient</th>
            <th>Service</th>
            <th>Caregiver</th>
        </tr>

        {% for b in bookings %}
        <tr>
            <td>{{ b[1] }}</td>
            <td>{{ b[2] }}</td>
            <td>{{ b[3] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
