{% extends "base.html" %}
{% block content %}

<div class="container py-5 text-center text-white">

<h2 class="mb-5">👑 Admin Dashboard</h2>

<!-- ✅ EMERGENCY SOS BANNER CONTAINER -->
<div id="sosContainer" class="d-none text-center fw-bold mt-4 mb-5 mx-auto" style="max-width: 900px; background-color: #fce8e8; color: #a11e22; border-radius: 8px; font-size: 18px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid #a11e22; animation: blinker 1s linear infinite;">
    <div>🚨 <span id="sosMessage">ACTIVE SOS EMERGENCY FROM CAREGIVER! REVIEW IMMEDIATELY.</span> 🚨</div>
    <form id="sosForm" method="POST" action="" class="mt-3">
        <button type="submit" class="btn btn-danger btn-sm px-4 fw-bold">MARK AS RESOLVED</button>
    </form>
</div>

<style>
@keyframes blinker {
  50% { opacity: 0; }
}
</style>

<!-- Audio element for siren -->
<!-- Using a standard notification sound, but looping it like an alarm -->
<audio id="sosAlarm" loop>
    <source src="https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3" type="audio/mpeg">
</audio>

<div class="row g-4 mx-auto mb-5" style="max-width: 900px;">

    <div class="col-md-6">
        <div class="text-center" style="background: rgba(43, 61, 47, 0.95); border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);">
            <h5 class="fw-bold text-white mb-3">Total Users</h5>
            <h2 class="fw-bold text-white" style="font-size: 2.5rem;">{{ users }}</h2>
        </div>
    </div>

    <div class="col-md-6">
        <div class="text-center" style="background: rgba(43, 61, 47, 0.95); border-radius: 15px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.4);">
            <h5 class="fw-bold text-white mb-3">Total Bookings</h5>
            <h2 class="fw-bold text-white" style="font-size: 2.5rem;">{{ bookings }}</h2>
        </div>
    </div>

</div>

<div class="d-flex justify-content-center gap-4 flex-wrap mx-auto" style="max-width: 900px;">
    <a href="/view_all_bookings" class="btn text-dark fw-bold" style="background: linear-gradient(to bottom, #f3d4a6, #dfb47c); border-radius: 30px; padding: 15px 30px; font-size: 14px; letter-spacing: 1px; width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">VIEW BOOKINGS</a>
    <a href="/manage_users" class="btn text-dark fw-bold" style="background: linear-gradient(to bottom, #e2c08d, #ce9e61); border-radius: 30px; padding: 15px 30px; font-size: 14px; letter-spacing: 1px; width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">MANAGE USERS</a>
    <a href="/medical_items" class="btn text-dark fw-bold" style="background: linear-gradient(to bottom, #dcb37b, #c69450); border-radius: 30px; padding: 15px 30px; font-size: 14px; letter-spacing: 1px; width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">MANAGE INVENTORY</a>
</div>

</div>

<script>
let lastAlarmState = false;

function checkSOS() {
    fetch('/api/check_sos')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('sosContainer');
            const alarm = document.getElementById('sosAlarm');
            const form = document.getElementById('sosForm');
            const message = document.getElementById('sosMessage');

            if (data.status === 'active' && data.emergencies && data.emergencies.length > 0) {
                // Show banner
                container.classList.remove('d-none');
                
                // Get the most recent one
                const latest = data.emergencies[0];
                message.innerText = `ACTIVE SOS FROM CAREGIVER: ${latest.caregiver.toUpperCase()} (${latest.time})`;
                form.action = `/resolve_sos/${latest.id}`;
                
                // Play alarm if not already playing
                if (!lastAlarmState) {
                    alarm.play().catch(e => console.log('Audio autoplay prevented:', e));
                    lastAlarmState = true;
                }
            } else {
                // Hide and stop
                container.classList.add('d-none');
                
                if (lastAlarmState) {
                    alarm.pause();
                    alarm.currentTime = 0;
                    lastAlarmState = false;
                }
            }
        })
        .catch(error => console.error('Error checking SOS:', error));
}

// Check immediately and then every 5 seconds
checkSOS();
setInterval(checkSOS, 5000);
</script>

{% endblock %}
