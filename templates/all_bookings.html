{% extends "base.html" %}
{% block content %}

<h2 class="text-center text-white mb-4">All Bookings</h2>

<table class="table table-dark table-hover">
<tr>
<th>ID</th>
<th>Patient</th>
<th>Service</th>
<th>Caregiver</th>
</tr>

{% for b in bookings %}
<tr>
<td>{{ b[0] }}</td>
<td>{{ b[1] }}</td>
<td>{{ b[2] }}</td>
<td>{{ b[3] }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
