{% extends "base.html" %}
{% block content %}

<div class="container py-5 text-center text-white">

<h2 class="mb-5">🎥 Caregiver Training Videos</h2>

<div class="row">

{% for v in videos %}
<div class="col-md-6 mb-4">

    <div class="glass-card p-3">

        <h5>{{ v.title }}</h5>

        <iframe width="100%" height="250"
        src="{{ v.link }}"
        frameborder="0"
        allowfullscreen></iframe>

    </div>

</div>
{% endfor %}

</div>

</div>

{% endblock %}
